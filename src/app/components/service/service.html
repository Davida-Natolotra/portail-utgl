<!-- Services Section -->
<section id="services" class="services section">

  <div class="container section-title" data-aos="fade-up">
    <h2>{{ meta().title }}</h2>
    <p>{{ meta().subtitle }}</p>
  </div>

  <div class="container">
    <div class="row gy-4">

      @for (service of services(); track service.id) {
        <div
          class="col-lg-4 col-md-6"
          data-aos="fade-up"
          [attr.data-aos-delay]="($index + 1) * 100"
        >
          <div class="service-item position-relative d-flex flex-column">
            <div class="icon">
              <i class="bi" [class]="service.icon" aria-hidden="true"></i>
            </div>
            <a [href]="service.link" class="service-title-link">
              <h3>{{ service.title }}</h3>
            </a>
            <p>{{ service.description }}</p>
            <div class="service-download mt-auto pt-3">
              <a
                [href]="service.downloadUrl"
                class="service-btn-download"
                [attr.download]="service.title"
                [attr.aria-label]="service.downloadLabel + ' ' + service.title"
              >
                <i class="bi bi-download" aria-hidden="true"></i>
                {{ service.downloadLabel }}
              </a>
            </div>
          </div>
        </div>
      }

    </div>
  </div>

</section>
<!-- /Services Section -->
