<!-- Call To Action Section -->
<section id="call-to-action" class="call-to-action section dark-background">

  <img
    [ngSrc]="content().backgroundImageUrl"
    alt=""
    [width]="content().backgroundImageWidth"
    [height]="content().backgroundImageHeight"
  >

  <div class="container">
    <div class="row justify-content-center" data-aos="zoom-in" data-aos-delay="100">
      <div class="col-xl-10">
        <div class="text-center">
          <h3>{{ content().title }}</h3>
          <p>{{ content().description }}</p>
          <a class="cta-btn" [href]="content().buttonLink">{{ content().buttonLabel }}</a>
        </div>
      </div>
    </div>
  </div>

</section>
<!-- /Call To Action Section -->
